name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, amd64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Update build assets
        run: wails3 task common:update:build-assets

      - name: Generate bindings
        run: wails3 task common:generate:bindings

      - name: Build macOS ${{ matrix.arch }}
        run: env ARCH=${{ matrix.arch }} wails3 task package

      - name: Find app bundle
        id: find-app
        run: |
          if [ -d "bin/codeswitch.app" ]; then
            echo "app_path=bin/codeswitch.app" >> $GITHUB_OUTPUT
          elif [ -d "bin/CodeSwitch.app" ]; then
            echo "app_path=bin/CodeSwitch.app" >> $GITHUB_OUTPUT
          else
            echo "App bundle not found" >&2
            exit 1
          fi

      - name: Archive macOS app
        run: |
          cd bin
          ditto -c -k --sequesterRsrc --keepParent "$(basename ${{ steps.find-app.outputs.app_path }})" codeswitch-macos-${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: bin/codeswitch-macos-${{ matrix.arch }}.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Install NSIS
        run: choco install nsis -y

      - name: Update build assets
        run: wails3 task common:update:build-assets

      - name: Generate bindings
        run: wails3 task common:generate:bindings

      - name: Build Windows Binary
        run: |
          $env:ARCH = "amd64"
          wails3 task windows:build
        env:
          PRODUCTION: "true"

      - name: Verify Binary
        run: |
          if (Test-Path "bin\CodeSwitch.exe") {
            Write-Host "✓ Binary found: bin\CodeSwitch.exe"
            Get-Item "bin\CodeSwitch.exe" | Format-List Name,Length,LastWriteTime
          } else {
            Write-Host "✗ Binary not found!"
            Write-Host "Listing bin directory:"
            Get-ChildItem bin -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Create NSIS Installer
        run: |
          $env:PATH += ";C:\Program Files (x86)\NSIS"
          Push-Location build\windows\nsis
          wails3 generate webview2bootstrapper
          $binaryPath = (Resolve-Path "..\..\..\bin\CodeSwitch.exe").Path
          Write-Host "Binary path: $binaryPath"
          makensis -DARG_WAILS_AMD64_BINARY="$binaryPath" project.nsi
          Pop-Location

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: |
            bin/CodeSwitch-amd64-installer.exe
            bin/CodeSwitch.exe

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Update build assets
        run: wails3 task common:update:build-assets

      - name: Generate bindings
        run: wails3 task common:generate:bindings

      - name: Package Linux amd64
        env:
          PRODUCTION: "true"
        run: wails3 task linux:package

      - name: Normalize artifact names
        run: |
          set -euo pipefail
          shopt -s nullglob

          # 疑似 Wails 上游 bug，AppImage 打包出来无法使用
          # appimage_files=(bin/*.AppImage)
          # [[ ${#appimage_files[@]} -gt 0 ]] || { echo "AppImage 未生成" >&2; exit 1; }
          # mv "${appimage_files[0]}" bin/codeswitch-linux-amd64.AppImage

          deb_files=(bin/*.deb)
          [[ ${#deb_files[@]} -gt 0 ]] || { echo "deb 包未生成" >&2; exit 1; }
          mv "${deb_files[0]}" bin/codeswitch-linux-amd64.deb

          rpm_files=(bin/*.rpm)
          [[ ${#rpm_files[@]} -gt 0 ]] || { echo "rpm 包未生成" >&2; exit 1; }
          mv "${rpm_files[0]}" bin/codeswitch-linux-amd64.rpm

          arch_files=(bin/*.pkg.tar.*)
          [[ ${#arch_files[@]} -gt 0 ]] || { echo "Arch 包未生成" >&2; exit 1; }
          mv "${arch_files[0]}" bin/codeswitch-linux-amd64.pkg.tar.zst

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-amd64
          path: |
            bin/codeswitch-linux-amd64.deb
            bin/codeswitch-linux-amd64.rpm
            bin/codeswitch-linux-amd64.pkg.tar.zst

  create-release:
    name: Create Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/macos-arm64/codeswitch-macos-arm64.zip release-assets/
          cp artifacts/macos-amd64/codeswitch-macos-amd64.zip release-assets/
          cp artifacts/windows-amd64/CodeSwitch-amd64-installer.exe release-assets/
          cp artifacts/windows-amd64/CodeSwitch.exe release-assets/
          # 疑似 Wails 上游 bug，AppImage 打包出来无法使用
          # cp artifacts/linux-amd64/codeswitch-linux-amd64.AppImage release-assets/
          cp artifacts/linux-amd64/codeswitch-linux-amd64.deb release-assets/
          cp artifacts/linux-amd64/codeswitch-linux-amd64.rpm release-assets/
          cp artifacts/linux-amd64/codeswitch-linux-amd64.pkg.tar.zst release-assets/
          ls -lh release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          body: |
            ## 更新亮点

            - 🔍 **图标选择器搜索**：编辑供应商时图标选择器新增搜索过滤功能，支持按图标名称关键词快速定位。
            - ✏️ **供应商名称编辑**：供应商名称现支持直接编辑，无需删除重建。
            - 📋 **复制供应商**：新增复制供应商功能，可快速创建配置相似的供应商。
            - 🚀 **供应商路由更稳**：移除 Level 分组后按列表顺序重试，日志与失败提示更清晰，成功率统计也不再误将失败计为成功。
            - ⚙️ **开机自启动**：新增"开机自启动"开关，安装后可一键配置后台随系统启动。
            - 📥 **cc-switch 导入优化**：即使未检测到默认配置也可直接导入，旁路上传提示更友好。

            ## 安装说明

            - **Windows**：下载 `codeswitch-amd64-installer.exe` 运行安装，或下载 `codeswitch.exe` 直接运行
            - **macOS (Apple Silicon)**：下载 `codeswitch-macos-arm64.zip`
            - **macOS (Intel)**：下载 `codeswitch-macos-amd64.zip`
            - **Linux (amd64)**：
              - Debian/Ubuntu：下载 `codeswitch-linux-amd64.deb` 后执行 `sudo dpkg -i codeswitch-linux-amd64.deb`
              - RHEL/CentOS：下载 `codeswitch-linux-amd64.rpm` 后执行 `sudo rpm -i codeswitch-linux-amd64.rpm`
              - Arch/Manjaro：下载 `codeswitch-linux-amd64.pkg.tar.zst` 后执行 `sudo pacman -U codeswitch-linux-amd64.pkg.tar.zst`

            > **注意**：由于 Wails 打包问题，暂时移除了 Linux AppImage 格式的发布。请使用上述其他格式进行安装。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
